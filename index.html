<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Form Validation</h1>
    <form novalidate>
        <div class="form-div">
            <label for="email">Email</label>
            <input type="email" class="input-field" id="email" required placeholder="e.g. email@example.com">
            <span id="email-error"></span>
        </div>
        <div class="form-div">
            <label for="country">Country</label>
            <input type="text" class="input-field" id="country" required placeholder="e.g. Palestine" minlength="4" maxlength="52">
            <span id="country-error"></span>
        </div>
        <div class="form-div">
            <label for="code">Postal Code</label>
            <input type="text" class="input-field" id="code" required placeholder="e.g. 12345678" minlength="3" maxlength="10">
            <span id="code-error"></span>
        </div>
        <div class="form-div">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="8">
            <input type="password" id="password-2" required minlength="8">
            <span id="password-error"></span>
        </div>
        <button id="submit-btn" type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    <script src="script.js"></script>
</body>

</html>
